name: Generate contribution snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVG files
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: starfishwrx
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Publish to output branch
        run: |
          mkdir -p out
          cp -r dist/. out/
          touch out/.nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin output; then
            git fetch origin output
            git switch --force-create output origin/output
          else
            git switch --orphan output
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name out -exec rm -rf {} +
          cp -r out/. .
          rm -rf out

          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Generate contribution snake"
          git push origin output --force
